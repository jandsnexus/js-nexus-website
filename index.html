<!DOCTYPE html>

<html lang="de">

<head>

  <meta charset="UTF-8">

  <meta name="viewport" content="width=device-width, initial-scale=1.0">

  <title>J&S Nexus</title>

  <!-- Luxus Schrift -->

  <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@500;700&family=Inter:wght@300;400&display=swap" rel="stylesheet">

  <style>

    * {

      margin: 0;

      padding: 0;

      box-sizing: border-box;

    }

    body {

      background: #0b0d0c;

      color: #e8e8e8;

      font-family: 'Inter', sans-serif;

    }

    .hero {

      height: 100vh;

      display: flex;

      flex-direction: column;

      justify-content: center;

      padding: 80px;

      background: radial-gradient(circle at top left, #0f1a14, #0b0d0c);

    }

    h1 {

      font-family: 'Playfair Display', serif;

      font-size: 6rem;

      letter-spacing: 3px;

      margin-bottom: 20px;

      color: #f5f5f5;

    }

    .accent {

      color: #3e6b52;

    }

    p {

      font-size: 1.3rem;

      color: #a0a0a0;

      max-width: 500px;

    }

    .btn {

      margin-top: 50px;

      display: inline-block;

      padding: 14px 32px;

      border: 1px solid #3e6b52;

      text-decoration: none;

      color: #e8e8e8;

      transition: all 0.3s ease;

      letter-spacing: 1px;

    }

    .btn:hover {

      background: #3e6b52;

      color: #0b0d0c;

    }

  </style>

</head>

<body>

  <div class="hero">

    <h1>J<span class="accent">&</span>S</h1>

    <p>AI Automation. Chatbots. Web Design.</p>

    <a href="#" class="btn">Mehr erfahren</a>

  </div>

</body>

</html>
